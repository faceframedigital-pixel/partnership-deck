<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>פייספרים × בנימין מלכא — הצעת שיתוף פעולה</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  :root{
    --bg:#0A0E14;
    --bg-soft:#0C1119;
    --card:#121821;
    --card2:#1A222E;
    --stroke:#242E3C;
    --stroke-lt:#2E3A4A;
    --cyan:#22D3EE;
    --cyan-dim:#0E7C8C;
    --cyan-deep:#0a3d47;
    --green:#34D399;
    --green-deep:#1F7A5A;
    --text:#E8EDF4;
    --text-mid:#9AA7B8;
    --text-dim:#5C6878;
    --font:'Heebo',system-ui,sans-serif;
    --mono:'Space Mono','Heebo',monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  #root{height:100%;}

  .deck{
    height:100dvh;
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    scrollbar-width:none;
  }
  .deck::-webkit-scrollbar{display:none;}

  .slide{
    min-height:100dvh;
    min-height:100vh;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:clamp(1.25rem,4.5vw,3.5rem);
    position:relative;
    overflow:hidden;
  }
  .slide-inner{width:100%;max-width:1080px;margin:0 auto;}

  .anim{opacity:0;transform:translateY(22px);transition:opacity .7s cubic-bezier(.2,.7,.3,1),transform .7s cubic-bezier(.2,.7,.3,1);}
  .in-view .anim{opacity:1;transform:none;}
  .in-view .anim.d1{transition-delay:.06s}
  .in-view .anim.d2{transition-delay:.14s}
  .in-view .anim.d3{transition-delay:.22s}
  .in-view .anim.d4{transition-delay:.30s}
  .in-view .anim.d5{transition-delay:.38s}
  .in-view .anim.d6{transition-delay:.46s}
  @media (prefers-reduced-motion:reduce){
    .anim{opacity:1;transform:none;transition:none;}
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:clamp(.62rem,1.6vw,.72rem);
    letter-spacing:.28em;
    color:var(--cyan);
    direction:ltr;
    text-align:left;
    display:inline-block;
    margin-bottom:.7rem;
  }
  .mono{font-family:var(--mono);direction:ltr;display:inline-block;}
  .title{
    font-weight:900;
    font-size:clamp(1.9rem,6.4vw,3rem);
    line-height:1.05;
    letter-spacing:-.01em;
  }
  .subtitle{
    color:var(--text-mid);
    font-size:clamp(.95rem,2.6vw,1.18rem);
    font-weight:400;
    line-height:1.5;
    margin-top:.85rem;
  }
  .muted{color:var(--text-mid);}
  .dim{color:var(--text-dim);}
  .cyan{color:var(--cyan);}
  .green{color:var(--green);}

  .card{
    background:var(--card);
    border:1px solid var(--stroke);
    border-radius:16px;
    padding:clamp(1rem,2.6vw,1.4rem);
    position:relative;
    transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
  }
  @media(hover:hover){
    .card:hover{transform:translateY(-4px);border-color:var(--stroke-lt);box-shadow:0 14px 40px rgba(0,0,0,.35);}
  }
  .card.hot{
    background:var(--card2);
    border-color:var(--cyan-dim);
    box-shadow:0 0 38px rgba(34,211,238,.13);
  }
  .icon-tile{
    width:46px;height:46px;border-radius:11px;
    background:var(--card2);border:1px solid var(--cyan-dim);
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }
  .icon-tile.green{border-color:var(--green);}
  .icon-tile svg{width:22px;height:22px;}

  .grid{display:grid;gap:clamp(.7rem,1.8vw,1rem);}
  .g-2{grid-template-columns:repeat(2,1fr);}
  .g-3{grid-template-columns:repeat(3,1fr);}
  .pillars{grid-template-columns:repeat(5,1fr);}
  .pipeline{grid-template-columns:repeat(4,1fr);}
  @media(max-width:820px){
    .g-2{grid-template-columns:1fr;}
    .g-3{grid-template-columns:1fr;}
    .pillars{grid-template-columns:repeat(3,1fr);}
    .pipeline{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:430px){
    .pillars{grid-template-columns:repeat(2,1fr);}
  }

  .split-2{display:grid;gap:clamp(.7rem,1.8vw,1rem);}
  .split-platform{grid-template-columns:1.05fr .95fr;}
  .split-revenue{grid-template-columns:1.4fr 1fr;}
  @media(max-width:820px){
    .split-platform,.split-revenue{grid-template-columns:1fr;}
  }

  .rail{
    position:fixed;
    top:50%;right:clamp(.55rem,2vw,1.2rem);
    transform:translateY(-50%);
    display:flex;flex-direction:column;gap:9px;
    z-index:50;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--stroke-lt);
    border:none;cursor:pointer;padding:0;
    transition:all .3s ease;
  }
  .dot.active{background:var(--cyan);height:22px;border-radius:5px;box-shadow:0 0 12px rgba(34,211,238,.5);}
  @media(max-width:600px){.dot{width:6px;height:6px;}.dot.active{height:16px;}}

  .counter{
    position:fixed;bottom:clamp(.8rem,2.5vw,1.4rem);left:clamp(.9rem,3vw,1.5rem);
    font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;
    color:var(--text-dim);direction:ltr;z-index:50;
  }

  .glow{position:absolute;border-radius:50%;filter:blur(10px);pointer-events:none;}

  .bar-row{display:flex;align-items:center;gap:.7rem;margin-bottom:clamp(.6rem,1.7vw,.95rem);}
  .bar-label{flex:0 0 auto;width:clamp(110px,30%,190px);text-align:left;font-size:clamp(.72rem,1.8vw,.86rem);color:var(--text-mid);direction:rtl;}
  .bar-track{flex:1;height:clamp(20px,4.4vw,26px);background:var(--bg-soft);border-radius:6px;position:relative;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;width:0;transition:width 1s cubic-bezier(.2,.7,.3,1);}
  .in-view .bar-fill{width:var(--w);}
  .bar-val{flex:0 0 auto;font-family:var(--mono);font-size:clamp(.7rem,1.7vw,.82rem);color:var(--text);direction:ltr;min-width:58px;}

  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
  @media(max-width:430px){.chips{grid-template-columns:repeat(2,1fr);}}
  .chip{
    background:var(--card2);border:1px solid var(--stroke);
    border-radius:8px;padding:.5rem .4rem;text-align:center;
    font-size:clamp(.68rem,1.7vw,.8rem);color:var(--text-mid);
  }

  .node{
    width:clamp(44px,9vw,56px);height:clamp(40px,8vw,50px);
    border-radius:10px;background:var(--card2);border:1px solid var(--stroke-lt);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:var(--cyan);
    font-size:clamp(.9rem,2.4vw,1.1rem);margin-bottom:.7rem;
  }
  .node.hot{background:var(--cyan);color:var(--bg);border-color:var(--cyan);box-shadow:0 0 26px rgba(34,211,238,.45);}

  .dash-item{display:flex;gap:.55rem;align-items:flex-start;margin-bottom:.7rem;font-size:clamp(.82rem,2vw,.95rem);color:var(--text-mid);line-height:1.35;}
  .dash{color:var(--accent,var(--cyan));font-family:var(--mono);flex:0 0 auto;line-height:1.35;}

  .hint{
    position:absolute;bottom:clamp(1.1rem,4vw,2rem);left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:.4rem;
    color:var(--text-dim);font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;
    animation:bob 2.2s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}

  .footer-bar{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding-top:1rem;border-top:1px solid var(--stroke);flex-wrap:wrap;}
  .next-row{display:flex;gap:1rem;align-items:flex-start;margin-bottom:clamp(.7rem,2vw,1rem);}
  .next-num{
    width:clamp(38px,8vw,46px);height:clamp(38px,8vw,46px);border-radius:10px;flex:0 0 auto;
    background:var(--card2);border:1px solid var(--cyan-dim);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:var(--cyan);font-size:clamp(.95rem,2.4vw,1.1rem);
  }

  .price-hero{
    text-align:center;
    padding:clamp(1.4rem,4vw,2.2rem) 1rem;
    background:var(--card2);
    border:1px solid var(--cyan-dim);
    border-radius:18px;
    box-shadow:0 0 44px rgba(34,211,238,.12);
  }
  .price-num{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(2.2rem,8vw,3.6rem);
    color:var(--cyan);
    direction:ltr;
    line-height:1;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

const Ic = {
  money:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M5 9v.01M19 15v.01"/></svg>,
  clip:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3h6v1M9 12l2 2 4-4"/></svg>,
  brain:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 0 0-6 .5A3 3 0 0 0 5 11a3 3 0 0 0 3 4 3 3 0 0 0 4 1V5ZM12 5a3 3 0 0 1 6 .5A3 3 0 0 1 19 11a3 3 0 0 1-3 4 3 3 0 0 1-4 1V5Z"/></svg>,
  chart:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18M7 14l3-3 3 3 4-5"/></svg>,
  filter: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 4h18l-7 8v6l-4 2v-8L3 4Z"/></svg>,
  flow:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="15" width="6" height="6" rx="1"/><path d="M9 6h6a3 3 0 0 1 3 3v6"/></svg>,
  shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3 4 6v6c0 4.5 3.5 7.5 8 9 4.5-1.5 8-4.5 8-9V6l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>,
  userShield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3"/><path d="M4 20c0-3 2.5-5 5-5M16 11l3 1v2.5c0 1.7-1.3 2.8-3 3.5-1.7-.7-3-1.8-3-3.5V12l3-1Z"/></svg>,
  layers: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3 9 5-9 5-9-5 9-5ZM3 13l9 5 9-5M3 17l9 5 9-5"/></svg>,
  rocket: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13c-1.5 1.5-2 5-2 5s3.5-.5 5-2M9 15l-3-3c1-5 5-9 12-9 0 7-4 11-9 12ZM14 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/></svg>,
  bolt:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 4 14h7l-2 8 9-12h-7l2-8Z"/></svg>,
};

function Eyebrow({num,label}){
  return <div className="eyebrow anim">{num} / {label}</div>;
}

function Cover(){
  return (
    <div className="slide-inner" style={{maxWidth:980}}>
      <div className="glow" style={{width:'46vw',height:'46vw',maxWidth:520,maxHeight:520,background:'rgba(14,124,140,.16)',top:'-14%',right:'-10%'}}/>
      <div className="glow" style={{width:'34vw',height:'34vw',maxWidth:380,maxHeight:380,background:'rgba(14,124,140,.10)',bottom:'-6%',left:'-12%'}}/>

      <div className="anim" style={{display:'flex',alignItems:'center',gap:'.55rem',marginBottom:'1.8rem'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:'var(--green)'}}/>
        <span className="mono dim" style={{fontSize:'.7rem',letterSpacing:'.22em'}}>CONFIDENTIAL · PARTNERSHIP PROPOSAL</span>
      </div>

      <div className="mono cyan anim d1" style={{fontSize:'clamp(.85rem,2.4vw,1.05rem)',marginBottom:'.6rem'}}>// legal-tech partnership</div>

      <h1 className="title anim d2" style={{fontSize:'clamp(2rem,7.6vw,3.4rem)'}}>פייספרים <span className="cyan">×</span> בנימין מלכא</h1>

      <p className="subtitle anim d3" style={{maxWidth:680}}>מערכת CRM ואוטומציה מלאה למשרד עורכי דין — הצעת שיתוף פעולה</p>

      <div className="footer-bar anim d4" style={{marginTop:'clamp(2.2rem,7vw,3.4rem)'}}>
        <span className="mono" style={{fontSize:'.74rem',letterSpacing:'.08em'}}>פייספרים · אוטומציה ומערכות לעסקים</span>
        <span className="mono cyan" style={{fontSize:'.74rem',letterSpacing:'.18em'}}>90 DAYS</span>
      </div>

      <div className="hint">
        <span>SCROLL</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
    </div>
  );
}

function Challenge(){
  const pillars=[
    {l:'לידים מתפזרים',ic:Ic.filter,n:'01'},
    {l:'מענה איטי',ic:Ic.bolt,n:'02'},
    {l:'מסמכים ידנית',ic:Ic.clip,n:'03'},
    {l:'אין מעקב סוכנים',ic:Ic.userShield,n:'04'},
    {l:'אין נתונים בזמן אמת',ic:Ic.chart,n:'05'},
  ];
  return (
    <div className="slide-inner">
      <Eyebrow num="01" label="THE CHALLENGE"/>
      <h2 className="title anim d1">האתגר</h2>

      <p className="anim d2" style={{textAlign:'center',fontSize:'clamp(1.15rem,3.4vw,1.5rem)',margin:'clamp(1.6rem,5vw,2.6rem) auto .5rem',maxWidth:760,lineHeight:1.45}}>
        משרד עו״ד שמטפל בתיקי פטור משירות צבאי מקבל פניות רבות, צריך מענה מהיר ושקוף, וכיום מנהל הכל ידנית.
      </p>
      <p className="anim d3 cyan" style={{textAlign:'center',fontSize:'clamp(1.4rem,4.2vw,1.9rem)',fontWeight:800,marginBottom:'.8rem'}}>
        בדיוק את זה אנחנו פותרים.
      </p>
      <p className="anim d3 muted" style={{textAlign:'center',fontSize:'clamp(.88rem,2.2vw,1.02rem)',maxWidth:680,margin:'0 auto clamp(1.8rem,5vw,2.6rem)',lineHeight:1.5}}>
        המטרה: להפוך את השירות ללקוחות למהיר, טוב ויעיל פי כמה — הכל אוטומטי, עם הרבה פחות עבודה ופחות צורך בכוח אדם.
      </p>

      <div className="grid pillars anim d4">
        {pillars.map((p,i)=>(
          <div className="card" key={i} style={{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:'.5rem',padding:'clamp(.9rem,2.4vw,1.3rem) .6rem'}}>
            <span className="cyan" style={{width:30,height:30}}>{p.ic}</span>
            <span style={{fontWeight:700,fontSize:'clamp(.95rem,2.4vw,1.1rem)'}}>{p.l}</span>
            <span className="mono dim" style={{fontSize:'.7rem'}}>{p.n}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Solution(){
  const flow=[
    {ic:Ic.clip,t:'קליטת ליד אוטומטית',b:'כל פנייה — מאתר, פייסבוק, אינסטגרם או טלפון — נכנסת אוטומטית למערכת אחת.'},
    {ic:Ic.brain,t:'סיווג ותעדוף',b:'המערכת מסווגת כל ליד לפי דחיפות ורלוונטיות, ושומרת היסטוריה מלאה.'},
    {ic:Ic.chart,t:'ניתוב לאיש המכירות',b:'הליד מועבר אוטומטית לאיש המכירות הנכון, עם מעקב מלא אחרי יחס ההמרה.'},
  ];
  const params=['ניהול לידים','חתימה דיגיטלית','הקלטת שיחות','תמלול אוטומטי','מעקב המרות','תזכורות ועדות','אחסון ענן','גיבוי מאובטח','דוחות שבועיים','ניטור ביקורות שליליות'];
  return (
    <div className="slide-inner">
      <Eyebrow num="02" label="THE SOLUTION"/>
      <h2 className="title anim d1">המערכת שנבנה</h2>
      <p className="subtitle anim d2" style={{maxWidth:780}}>פלטפורמה אחת שמרכזת לידים, אוטומציה, מכירות ותקשורת — מותאמת אישית למשרד.</p>

      <div className="split-2 split-platform anim d3" style={{marginTop:'clamp(1.4rem,4vw,2rem)',alignItems:'stretch'}}>
        <div style={{display:'flex',flexDirection:'column',gap:'clamp(.6rem,1.6vw,.85rem)'}}>
          {flow.map((f,i)=>(
            <div className="card" key={i} style={{display:'flex',gap:'.85rem',alignItems:'center'}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:'clamp(.95rem,2.3vw,1.08rem)',marginBottom:'.25rem'}}>{f.t}</div>
                <div className="muted" style={{fontSize:'clamp(.78rem,1.9vw,.9rem)',lineHeight:1.4}}>{f.b}</div>
              </div>
              <div className="icon-tile"><span className="cyan">{f.ic}</span></div>
            </div>
          ))}
        </div>

        <div className="card hot" style={{display:'flex',flexDirection:'column'}}>
          <div className="cyan" style={{fontWeight:700,fontSize:'clamp(.95rem,2.3vw,1.08rem)',marginBottom:'.8rem'}}>מה כלול במערכת</div>
          <div className="chips">
            {params.map((p,i)=><div className="chip" key={i}>{p}</div>)}
          </div>
          <div className="dim" style={{fontSize:'.82rem',fontStyle:'italic',marginTop:'.8rem'}}>+ עוד יכולות בהתאם לצורך</div>
        </div>
      </div>
    </div>
  );
}

function Modules(){
  const steps=[
    {n:'01',t:'CRM מותאם אישית',b:'מערכת ניהול לקוחות ייעודית, כולל אחסון ושרתים לשנה מלאה'},
    {n:'02',t:'ניהול ספקים',b:'אנחנו מנהלים את כל הספקים והאינטגרציות מקצה לקצה'},
    {n:'03',t:'אוטומציית מסמכים',b:'שליחה וקבלה של מסמכים מרוכזת במערכת אחת, ללא ניירת'},
    {n:'04',t:'אוטומציות סושיאל',b:'מענה אוטומטי בפייסבוק ואינסטגרם והפניית לידים לאיש המכירות'},
    {n:'05',t:'מערכת מכירות חכמה',b:'חייגן מובנה, הקלטה ותמלול שיחות, מעקב המרות וקטלוג לידים',hot:true},
    {n:'06',t:'צ׳אטבוט וואטסאפ',b:'מענה מיידי עם AI, הסלמה אוטומטית לעו״ד במקרים דחופים'},

const SLIDES=[Cover,Challenge,Solution,Modules,WhyUs,TheDeal,Budget,Next];

function App(){
  const [active,setActive]=useState(0);
  const deckRef=useRef(null);
  const slideRefs=useRef([]);

  useEffect(()=>{
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        const idx=Number(e.target.dataset.idx);
        if(e.isIntersecting){
          e.target.classList.add('in-view');
          if(e.intersectionRatio>0.55) setActive(idx);
        }
      });
    },{threshold:[0.2,0.55,0.85]});
    slideRefs.current.forEach(el=>el&&io.observe(el));
    return ()=>io.disconnect();
  },[]);

  useEffect(()=>{
    const onKey=(e)=>{
      if(['ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();go(active+1);}
      if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();go(active-1);}
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[active]);

  const go=(i)=>{
    const t=Math.max(0,Math.min(SLIDES.length-1,i));
    slideRefs.current[t]?.scrollIntoView({behavior:'smooth'});
  };

  return (
    <div className="deck" ref={deckRef}>
      {SLIDES.map((S,i)=>(
        <section className="slide" key={i} data-idx={i} ref={el=>slideRefs.current[i]=el}>
          <S/>
        </section>
      ))}

      <div className="rail">
        {SLIDES.map((_,i)=>(
          <button key={i} className={'dot'+(i===active?' active':'')} onClick={()=>go(i)} aria-label={'שקופית '+(i+1)}/>
        ))}
      </div>

      <div className="counter">{String(active+1).padStart(2,'0')} / {String(SLIDES.length).padStart(2,'0')}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
